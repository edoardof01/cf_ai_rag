# --- PVCs (Volumi per la persistenza dei dati) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi # Spazio per i metadati di Milvus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi # Spazio per i file vettoriali (gli indici veri e propri)

---
# --- ETCD (Meta-storage per Milvus) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      containers:
      - name: etcd
        image: quay.io/coreos/etcd:v3.5.5
        command: ["etcd"]
        args:
        - "--advertise-client-urls=http://0.0.0.0:2379"
        - "--listen-client-urls=http://0.0.0.0:2379"
        - "--data-dir=/etcd"
        ports:
        - containerPort: 2379
        volumeMounts:
        - name: etcd-data
          mountPath: /etcd
      volumes:
      - name: etcd-data
        persistentVolumeClaim:
          claimName: milvus-etcd-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd-service
spec:
  selector:
    app: milvus-etcd
  ports:
  - port: 2379
    targetPort: 2379

---
# --- MINIO (Object storage per Milvus) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2023-03-20T20-16-18Z
        args: ["server", "/data"]
        env:
        - name: MINIO_ACCESS_KEY
          value: "minioadmin"
        - name: MINIO_SECRET_KEY
          value: "minioadmin"
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: minio-data
          mountPath: /data
      volumes:
      - name: minio-data
        persistentVolumeClaim:
          claimName: milvus-minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio-service
spec:
  selector:
    app: milvus-minio
  ports:
  - port: 9000
    targetPort: 9000

---
# --- MILVUS STANDALONE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-standalone
  template:
    metadata:
      labels:
        app: milvus-standalone
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:v2.4.0
        command: ["milvus", "run", "standalone"]
        env:
        - name: ETCD_ENDPOINTS
          value: "milvus-etcd-service:2379"
        - name: MINIO_ADDRESS
          value: "milvus-minio-service:9000"
        ports:
        - containerPort: 19530
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-standalone-service
spec:
  selector:
    app: milvus-standalone
  ports:
  - port: 19530
    targetPort: 19530
